<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">Login</div>
        <div class="card-body">
          <form>
            <div class="form-group">
              <label for="username">Usuario:</label>
              <input type="text" [(ngModel)]="usuario.usuario" class="form-control" id="username" name="username" required>
            </div>
            <div class="form-group">
              <label for="password">Contraseña:</label>
              <input type="password" [(ngModel)]="usuario.pass" class="form-control" id="password" name="password" required>
            </div>
            <input type="button" (click)="login()" value="Ingresar" class="btn btn-primary btn-block">
            <div class="form-group form-check">
              <input type="checkbox" class="form-check-input" id="mantenerLogueado" name="mantenerLogueado">
              <label class="form-check-label" for="mantenerLogueado">Mantenerse logueado</label>
            </div>
            <input type="button" (click)="prueba()">
            {{probando}}
          </form>

          <hr>
      
          <a type="button" class="btn btn-primary btn-block" [routerLink]="'/principal/registro'">Registrar</a>
        </div>
      </div>
    </div>
  </div>
</div>
