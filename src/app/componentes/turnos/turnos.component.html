<button class="btn" (click)="volver()" style="background: none; border: none; padding: 0;">
  <i class="bi bi-arrow-left-circle" style="font-size: 36px; font-weight: bold;"></i> <!-- Icono de flecha hacia la izquierda -->
</button>
<div class="container">
  <h1>Solicita un turno</h1>

  <label for="especialidad">Seleccionar Especialidad:</label>
  <select id="especialidad" (change)="onEspecialidadChange($event)">
    <option *ngFor="let especialidad of especialidades" [value]="especialidad.id">
      {{ especialidad.nombre }}
    </option>
  </select>

  <div *ngIf="medicos.length > 0">
    <h2>Médicos Disponibles:</h2>
    <div *ngFor="let medico of medicos">
      <p>{{ medico.nombre }} {{ medico.apellido }}</p>
      <button (click)="verAgenda(medico.medico_id)">VER AGENDA</button>
    </div>
  </div>
</div>
