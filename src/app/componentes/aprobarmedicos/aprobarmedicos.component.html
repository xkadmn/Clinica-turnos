<p>Médicos pendientes de aprobación</p>
<table class="table table-bordered table-hover">
  <thead class="thead-light">
    <tr>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let usuario of medicosNoAprobados" class="medico-item">
      <td>{{ usuario.nombre }}</td>
      <td>{{ usuario.apellido }}</td>
      <td>
        <button class="btn btn-info btn-sm" (click)="verFicha(usuario.id)">Ver ficha</button>
        <button class="btn btn-success btn-sm" (click)="aprobarMedico(usuario.id)">Aprobar</button>
      </td>
    </tr>
  </tbody>
</table>
