<h2>Calendario - Semana del {{ fechaInicioSemana | date:'dd-MM-yyyy' }} al {{ fechaFinSemana | date:'dd-MM-yyyy' }}</h2>
<div class="d-flex justify-content-between my-3">
  <button class="btn btn-outline-primary" (click)="semanaAnterior()">Semana Anterior</button>
  <button class="btn btn-outline-primary" (click)="semanaSiguiente()">Semana Siguiente</button>
</div>
<div class="container">
  <h1>Agenda Médica</h1>
  
  <table class="table table-bordered">
    <thead>
      <tr>
        <th *ngFor="let dia of diasSemana">{{ dia }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let hora of horas">
        <td *ngFor="let dia of diasSemana">
          <!-- Verifica si hay un turno disponible para ese día y hora -->
          <div *ngIf="horasPorDia[dia].includes(hora)" (click)="abrirTurno(dia, hora)">
            <button class="btn btn-primary">Turno {{ hora }}</button>
          </div>
          <div *ngIf="!horasPorDia[dia].includes(hora)">
            <span>No disponible</span>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>



<style>
  .disponible { background-color: green; }
  .no-disponible { background-color: red; }
</style>
